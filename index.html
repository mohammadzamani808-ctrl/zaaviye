<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zaviye | Interior Design</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Vazirmatn:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
background:linear-gradient(135deg,#0b0b0b,#1a1a1a);
display:flex;
justify-content:center;
align-items:center;
font-family:'Vazirmatn',sans-serif;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:450px;
height:450px;
background:#d4af37;
filter:blur(180px);
opacity:.15;
top:-150px;
right:-150px;
}

.card{

width:360px;
padding:40px 30px;
border-radius:30px;

background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

box-shadow:0 20px 50px rgba(0,0,0,.5);

text-align:center;

z-index:2;

}

.logo{

font-family:'Cinzel',serif;

font-size:46px;

color:#D4AF37;

letter-spacing:8px;

margin-bottom:10px;

}

.subtitle{

color:#d9d9d9;

font-size:15px;

margin-bottom:35px;

}

.icons{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:20px;

}

.icon{

height:90px;

border-radius:20px;

background:rgba(255,255,255,.05);

display:flex;

justify-content:center;

align-items:center;

font-size:32px;

color:white;

text-decoration:none;

transition:.35s;

border:1px solid rgba(255,255,255,.08);

}

.icon:hover{

transform:translateY(-8px) scale(1.05);

background:#D4AF37;

color:#111;

box-shadow:0 15px 35px rgba(212,175,55,.45);

}
